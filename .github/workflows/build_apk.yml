name: Build FocusGuard APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Find pubspec.yaml and set project root
        run: |
          PUBSPEC=$(find . -name "pubspec.yaml" | head -1)
          PROJECT_DIR=$(dirname "$PUBSPEC")
          echo "Found pubspec.yaml at: $PUBSPEC"
          echo "Project directory: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          cd $PROJECT_DIR
          flutter pub get

      - name: Build APK
        run: |
          cd $PROJECT_DIR
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FocusGuard-APK
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
