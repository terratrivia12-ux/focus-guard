name: Build FocusGuard APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build apk --release --no-tree-shake-icons
      - run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/FocusGuard.apk
      - uses: actions/upload-artifact@v4
        with:
          name: FocusGuard-APK
          path: build/app/outputs/flutter-apk/FocusGuard.apk
          retention-days: 30
