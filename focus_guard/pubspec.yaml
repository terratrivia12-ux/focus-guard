name: focus_guard
description: Focus & App Blocker with Pomodoro Timer
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^16.3.0
  audioplayers: ^6.0.0
  android_package_manager: ^0.2.5
  installed_apps: ^1.3.4
  permission_handler: ^11.3.0
  flutter_overlay_window: ^0.3.4
  google_fonts: ^6.2.1
  fl_chart: ^0.67.0
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
